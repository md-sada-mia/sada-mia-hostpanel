<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sada Mia HostPanel</title>
    <meta
      name="description"
      content="Lightweight self-hosted web hosting panel for Laravel and Next.js applications."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
    <!-- ─── Main ─────────────────────────────────────────────────────────────────── -->
    <main class="main" id="main" style="margin-left: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh;">
      
      <div class="settings-card" style="max-width: 500px; width: 100%; text-align: center; padding: 3rem 2rem;">
        <div class="logo" style="justify-content: center; margin-bottom: 2rem;">
          <div class="logo-icon" style="font-size: 3rem;">⚡</div>
          <div>
            <div class="logo-name" style="font-size: 1.5rem;">HostPanel</div>
            <div class="logo-sub">Launcher Setup</div>
          </div>
        </div>

        <div id="auth-section">
          <h2 class="settings-title" style="text-align: center;">Authenticate</h2>
          <p class="settings-desc" style="text-align: center; margin-bottom: 1.5rem;">
            Enter your API Secret to access the launcher control.
          </p>
          <div class="form-group">
            <input type="password" class="form-input" id="inp-token" placeholder="Paste your PANEL_SECRET here…" style="text-align: center; margin-bottom: 1rem;" />
            <button class="btn btn-primary w-full" style="width: 100%; justify-content: center;" onclick="saveToken()">Login</button>
          </div>
        </div>

        <div id="launcher-section" style="display: none;">
          <h2 class="settings-title" style="text-align: center;">Next.js Premium Panel</h2>
          
          <div class="github-status-box mt-3" style="padding: 1.5rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-card); display: flex; flex-direction: column; align-items: center; gap: 1rem;">
            <div id="pm2-status-icon" style="font-size: 3rem; animation: pulse 2s infinite;">⚪</div>
            <div id="pm2-status-text" style="font-weight: 500; font-size: 1.1rem;">Checking status...</div>
            
            <div id="pm2-actions" style="display: flex; gap: 1rem; margin-top: 1rem; width: 100%; justify-content: center;">
              <button id="btn-start" class="btn btn-primary" style="display: none; width: 100%; justify-content: center;" onclick="startPanel()">🚀 Launch Next.js Panel</button>
              <button id="btn-stop" class="btn btn-danger" style="display: none; width: 100%; justify-content: center;" onclick="stopPanel()">🛑 Shutdown Next.js Panel</button>
            </div>
          </div>
          
          <div id="panel-link-container" style="margin-top: 1.5rem; display: none;">
            <a id="panel-link" href="#" target="_blank" class="btn btn-ghost" style="color: var(--primary);">Go to Management Dashboard ↗</a>
          </div>

          <!-- Log Viewer -->
          <div id="log-container" style="display: none; margin-top: 1.5rem; text-align: left;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
              <span style="font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">Console Logs</span>
              <div style="display: flex; gap: 0.5rem;">
                <button onclick="copyLogs()" style="background: none; border: none; color: var(--primary); font-size: 0.7rem; cursor: pointer; text-decoration: underline;">Copy</button>
                <button onclick="clearLogs()" style="background: none; border: none; color: var(--primary); font-size: 0.7rem; cursor: pointer; text-decoration: underline;">Clear</button>
              </div>
            </div>
            <pre id="pm2-logs" style="background: #000; color: #0f0; padding: 1rem; border-radius: var(--radius); font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; min-height: 150px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; border: 1px solid #333;"></pre>
          </div>
        </div>

      </div>
    </main>

    <!-- ─── Toast ─────────────────────────────────────────────────────────────── -->
    <div class="toast-container" id="toast-container"></div>
    <script src="app.js"></script>
    <style>
      @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.5; }
        100% { opacity: 1; }
      }
      .w-full { width: 100%; }
    </style>
  </body>
</html>
